// ===================== ISOMETRIC BUILDING COMPONENT =====================
const IsoBld=({x,y,w,depth,height,color,roofColor,icon,label,progress,allDone,onClick,floors})=>{
const darken=(c,a)=>c+a;
const topW=w;const topD=depth;
// Isometric transforms
const isoX=(px,py)=>px-py;
const isoY=(px,py)=>(px+py)/2;

// Face colors
const rightFace=darken(color,"30");
const leftFace=darken(color,"50");
const topFace=color;

// Window pattern for front face
const winRows=floors||4;
const winCols=Math.max(2,Math.floor(w/20));

return h("g",{onClick,className:"iso-bld",style:{"--glow":color,cursor:"pointer"},transform:`translate(${x},${y})`},
// Shadow
h("ellipse",{cx:0,cy:height*0.52+10,rx:w*0.7,ry:depth*0.3,fill:"#00000025",filter:"blur(4px)"}),

// LEFT FACE (darker)
h("path",{d:`M${-w/2},0 L${-w/2},${-height} L${0},${-height-depth/2} L${0},${-depth/2} Z`,
fill:allDone?"#064e3b":"#0c1222",stroke:allDone?"#10b98140":color+"30",strokeWidth:1}),
// Windows left
Array.from({length:winRows}).map((_,r)=>
Array.from({length:Math.max(1,winCols-1)}).map((_,c)=>{
const wx=-w/2+8+c*((w/2-12)/(winCols-1||1));
const wy=-height+20+r*((height-35)/winRows);
const skewY=-depth/(2*height)*((wy+height));
const lit=((r+c)%3!==0);
return h("rect",{key:`l${r}${c}`,x:wx,y:wy+skewY*0.15,width:7,height:9,rx:1,
fill:lit?(allDone?"#10b98180":"#fbbf2460"):"#06091550",opacity:lit?0.8:0.6})})),

// RIGHT FACE (medium)
h("path",{d:`M${w/2},0 L${w/2},${-height} L${0},${-height-depth/2} L${0},${-depth/2} Z`,
fill:allDone?"#065f46":"#10142a",stroke:allDone?"#10b98140":color+"30",strokeWidth:1}),
// Windows right
Array.from({length:winRows}).map((_,r)=>
Array.from({length:Math.max(1,winCols-1)}).map((_,c)=>{
const wx=4+c*((w/2-12)/(winCols-1||1));
const wy=-height+20+r*((height-35)/winRows);
const lit=((r+c+1)%3!==0);
return h("rect",{key:`r${r}${c}`,x:wx,y:wy,width:7,height:9,rx:1,
fill:lit?(allDone?"#10b98170":"#fbbf2450"):"#06091550",opacity:lit?0.7:0.5})})),

// TOP FACE (roof)
h("path",{d:`M${0},${-height-depth/2} L${-w/2},${-height} L${0},${-height+depth/2} L${w/2},${-height} Z`,
fill:allDone?"#10b98130":color+"25",stroke:allDone?"#10b98150":color+"40",strokeWidth:1}),

// Roof accent line
h("line",{x1:-w/2,y1:-height,x2:w/2,y2:-height,stroke:allDone?"#10b981":color,strokeWidth:2,opacity:0.6}),

// Door
h("rect",{x:-5,y:-12,width:10,height:12,rx:2,fill:allDone?"#10b98140":color+"30",stroke:allDone?"#10b98160":color+"40",strokeWidth:1}),

// Icon floating above
h("text",{x:0,y:-height-depth/2-14,textAnchor:"middle",fontSize:22,style:{filter:"drop-shadow(0 2px 6px #00000080)",animation:"float 3s ease infinite"}},icon),

// Label below
h("text",{x:0,y:20,textAnchor:"middle",fontSize:9,fill:allDone?"#10b981":color,fontWeight:700,fontFamily:"Outfit",letterSpacing:0.5},label),

// Progress text
h("text",{x:0,y:32,textAnchor:"middle",fontSize:8,fill:"#4a5070",fontFamily:"Outfit"},progress),

// Completion badge
allDone&&h("circle",{cx:w/2-5,cy:-height+10,r:8,fill:"#10b981"}),
allDone&&h("text",{x:w/2-5,y:-height+14,textAnchor:"middle",fontSize:10,fill:"#fff"},"✓"),

// Glow border for in-progress
!allDone&&parseInt(progress)>0&&h("path",{d:`M${-w/2},0 L${-w/2},${-height} L${0},${-height-depth/2} L${w/2},${-height} L${w/2},0 L${0},${-depth/2} Z`,
fill:"none",stroke:color,strokeWidth:1.5,opacity:0.3,strokeDasharray:"4 3"})
)};
